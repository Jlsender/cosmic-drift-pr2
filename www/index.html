<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet" />
  <title>Cosmic Drift</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>


<body>


  <!-- Contenidor p5.js insertat al canvas -->

  <div id="contenidor-canvas"></div>

  <!-- Botó configuració -->

  <button id="boto-config" onclick="toggleConfig()">⚙️</button>

  <!-- Panell de configuració -->

  <div id="panell-config" class="ocult">
    <div id="config-interior">
      <h2>⚙️ Configuració</h2>
      <div id="config-controls">
        <div class="config-fila">
          <label>Velocitat de la nau</label>
          <input type="range" id="velocitat" min="1" max="5" value="3" />
        </div>

        <div class="config-fila">
          <label>Densitat d'asteroides</label>
          <input type="range" id="densitat" min="1" max="10" value="5" />
        </div>
        <div id="config-botons">
          <button onclick="guardarConfig()">Guardar</button>
          <button onclick="toggleConfig()">Tancar</button>
        </div>
        <p id="record-text">Rècord: 0s</p>
      </div>
      <p id="config-peu">20.471 – Desenvolupament d'aplicacions interactives – PR2 - UOC 2025/26  <br>COSMIC DRIFT V.2.0<br>Jose López Sender</p>
    </div>
  </div>

  
  <!-- Fitxa informativa de l'asteroide impactat -->

  <div id="panell-fitxa" class="ocult">
    <div id="fitxa-contingut">
      <h2>💥 Has xocat!</h2>
      <p id="fitxa-nom"></p>
      <p id="fitxa-perillos"></p>
      <p id="fitxa-temps"></p>
      <button onclick="tancarFitxa()">Tornar a jugar</button>
    </div>
  </div>


  <!-- Música de fons -->
    <audio id="musica-fons" loop>
    <source src="assets/Pixel High Score.mp3" type="audio/mpeg" />
  </audio>


  <!-- Llibreria p5.js  -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  
  <script src="js/sketch.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
